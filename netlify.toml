# Repo-root netlify.toml.
#
# Tells Netlify the deployable app lives in ./app — Next.js dashboard published
# to admin.switchleads.co.uk. Netlify cd's to ./app before reading the rest of
# the build config, so app/netlify.toml provides the per-build settings (build
# command, plugins, headers).
#
# Build-on-every-push for now. The previous `ignore` directive
# (`git diff --quiet HEAD^ HEAD ./app/`) was meant to skip builds when only
# docs/migrations changed, but it incorrectly suppressed a real app/-only
# deploy on 2026-04-27 — root cause not yet diagnosed. Re-add a working
# filter once we have a reliable test pattern. Build minutes are cheap
# enough during pilot to not gate on this.

[build]
  base = "app"
