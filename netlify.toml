# Repo-root netlify.toml.
#
# Tells Netlify the deployable app lives in ./app — Next.js dashboard published
# to admin.switchleads.co.uk. Netlify cd's to ./app before reading the rest of
# the build config, so app/netlify.toml provides the per-build settings (build
# command, plugins, headers).
#
# Path filter: only trigger a build when something inside ./app changed. Doc
# updates, migration files, Edge Functions changes, agent notes do not need to
# burn a Netlify build.
#
# This file exists because the repo became a monorepo on 2026-04-26 covering
# app/ + supabase/ + docs/ — see platform/docs/changelog.md.

[build]
  base    = "app"
  ignore  = "git diff --quiet HEAD^ HEAD ./app/"
