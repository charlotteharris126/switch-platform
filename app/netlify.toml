[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Tell Netlify's secrets scanner to ignore env vars whose values are
  # legitimately public. NEXT_PUBLIC_* vars are exposed to the browser
  # by Next.js design, and the Supabase URL is the literal API endpoint —
  # both appear in source code (admin SQL recipes, EF URLs in actions.ts).
  # Without this, the scanner false-flags every new deploy.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers — applied to every response unless overridden.
# CSP intentionally absent for now; will be tuned in Session E once we know
# every external origin in use (Supabase, Brevo widgets, etc.).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
